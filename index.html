<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>가계부</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f7f6f3;
      --surface: #ffffff;
      --surface2: #f1efe8;
      --border: rgba(0,0,0,0.1);
      --border2: rgba(0,0,0,0.18);
      --text: #1a1a18;
      --text2: #5f5e5a;
      --text3: #9c9a92;
      --green: #0f6e56;
      --red: #993c1d;
      --amber: #854f0b;
      --blue: #185fa5;
      --radius: 10px;
      --radius-lg: 14px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a18; --surface: #242422; --surface2: #2c2c2a;
        --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.18);
        --text: #e8e6de; --text2: #9c9a92; --text3: #5f5e5a;
      }
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .app { max-width: 600px; margin: 0 auto; padding: 20px 16px 60px; }

    /* 헤더 */
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .month-nav { display: flex; align-items: center; gap: 12px; }
    .month-title { font-size: 20px; font-weight: 600; color: var(--text); }
    .nav-btn { background: var(--surface); border: 0.5px solid var(--border2); border-radius: 8px; padding: 6px 13px; cursor: pointer; font-size: 14px; color: var(--text2); }
    .nav-btn:hover { background: var(--surface2); }
    .share-btn { background: var(--surface); border: 0.5px solid var(--border2); border-radius: 8px; padding: 6px 13px; cursor: pointer; font-size: 13px; color: var(--blue); font-weight: 500; }

    /* 탭 */
    .tab-row { display: flex; gap: 6px; margin-bottom: 16px; }
    .tab { padding: 6px 14px; border-radius: 8px; font-size: 13px; cursor: pointer; border: 0.5px solid var(--border2); background: none; color: var(--text2); }
    .tab.active { background: var(--text); color: var(--bg); border-color: var(--text); }

    /* 요약 카드 */
    .summary-grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 8px; margin-bottom: 12px; }
    .summary-grid.two { grid-template-columns: repeat(2, minmax(0,1fr)); }
    .metric { background: var(--surface2); border-radius: var(--radius); padding: 13px; }
    .metric-label { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
    .metric-value { font-size: 17px; font-weight: 600; color: var(--text); word-break: break-all; }
    .metric-value.green { color: var(--green); }
    .metric-value.red { color: var(--red); }
    .metric-diff { font-size: 11px; margin-top: 3px; }
    .diff-up { color: var(--green); } .diff-down { color: var(--red); } .diff-same { color: var(--text3); }

    /* 섹션 */
    .section { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); margin-bottom: 10px; overflow: hidden; }
    .sec-head { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; cursor: pointer; user-select: none; }
    .sec-head:hover { background: var(--surface2); }
    .sec-title { font-size: 13px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 7px; }
    .sec-body { border-top: 0.5px solid var(--border); padding: 10px 14px; }
    .chevron { font-size: 11px; color: var(--text3); transition: transform 0.2s; }
    .collapsed .chevron { transform: rotate(-90deg); }

    /* 항목 */
    .cat-block { margin-bottom: 10px; }
    .cat-label { font-size: 11px; font-weight: 600; padding: 2px 7px; border-radius: 4px; display: inline-block; margin-bottom: 5px; }
    .cat-sum { font-size: 11px; color: var(--text2); }
    .entry-row { display: flex; align-items: flex-start; gap: 8px; padding: 6px 0; border-bottom: 0.5px solid var(--border); }
    .entry-row:last-child { border-bottom: none; }
    .entry-info { flex: 1; }
    .entry-name { font-size: 13px; color: var(--text); }
    .entry-note { font-size: 11px; color: var(--text3); margin-top: 2px; line-height: 1.5; }
    .entry-right { display: flex; align-items: center; gap: 6px; margin-top: 2px; }
    .amt-input { width: 110px; border: 0.5px solid var(--border2); border-radius: 6px; padding: 4px 7px; font-size: 13px; text-align: right; background: var(--surface2); color: var(--text); }
    .amt-input:focus { outline: none; border-color: var(--blue); background: var(--surface); }
    .amt-input.empty { border-color: #ba7517; background: rgba(186,117,23,0.08); }
    .amt-unit { font-size: 12px; color: var(--text3); }
    .amt-fixed { font-size: 13px; color: var(--text2); }
    .entry-del { background: none; border: none; cursor: pointer; font-size: 16px; color: var(--text3); padding: 0 2px; line-height: 1; }
    .entry-del:hover { color: var(--red); }

    /* 추가 폼 */
    .add-row { display: flex; gap: 6px; margin-top: 10px; padding-top: 10px; border-top: 0.5px solid var(--border); flex-wrap: wrap; }
    .add-row select, .add-row input { border: 0.5px solid var(--border2); border-radius: 8px; padding: 7px 9px; font-size: 12px; background: var(--surface); color: var(--text); }
    .add-row select:focus, .add-row input:focus { outline: none; border-color: var(--blue); }
    .sel-cat { flex: 1; min-width: 90px; }
    .inp-name { flex: 1.5; min-width: 100px; }
    .inp-amt { width: 100px; }
    .add-btn { background: var(--surface2); border: 0.5px solid var(--border2); border-radius: 8px; padding: 7px 13px; cursor: pointer; font-size: 12px; color: var(--text); white-space: nowrap; font-weight: 500; }
    .add-btn:hover { background: var(--border); }

    /* 알림 */
    .notice { font-size: 11px; color: var(--amber); background: rgba(186,117,23,0.1); border: 0.5px solid rgba(186,117,23,0.25); border-radius: 7px; padding: 7px 11px; margin-bottom: 10px; display: none; }
    .badge-warn { font-size: 10px; padding: 1px 6px; border-radius: 3px; background: rgba(186,117,23,0.15); color: var(--amber); display: none; }

    /* 구성 바 */
    .bar-stack { display: flex; height: 8px; border-radius: 4px; overflow: hidden; gap: 2px; margin: 8px 0; }
    .bar-seg { height: 100%; border-radius: 2px; transition: width 0.4s; min-width: 2px; }
    .legend-row { display: flex; flex-wrap: wrap; gap: 10px; font-size: 11px; color: var(--text2); margin-top: 4px; }
    .legend-item { display: flex; align-items: center; gap: 4px; }
    .legend-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

    /* 추이 차트 */
    .trend-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; font-size: 12px; }
    .trend-label { width: 36px; text-align: right; color: var(--text2); flex-shrink: 0; font-size: 11px; }
    .trend-bars { flex: 1; display: flex; flex-direction: column; gap: 3px; }
    .trend-bw { background: var(--surface2); border-radius: 3px; height: 13px; overflow: hidden; }
    .trend-bi { height: 100%; background: #1d9e75; border-radius: 3px; }
    .trend-be { height: 100%; background: #d85a30; border-radius: 3px; }
    .trend-vals { width: 86px; font-size: 10px; display: flex; flex-direction: column; gap: 3px; text-align: right; flex-shrink: 0; }
    .diff-row { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 0.5px solid var(--border); font-size: 12px; }
    .empty { font-size: 12px; color: var(--text3); text-align: center; padding: 10px 0; }

    /* 공유 모달 */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 100; display: none; }
    .modal { background: var(--surface); border-radius: var(--radius-lg); padding: 24px; width: 90%; max-width: 380px; }
    .modal h3 { font-size: 15px; font-weight: 600; margin-bottom: 8px; }
    .modal p { font-size: 12px; color: var(--text2); margin-bottom: 16px; line-height: 1.6; }
    .modal-input { width: 100%; border: 0.5px solid var(--border2); border-radius: 8px; padding: 9px 11px; font-size: 13px; background: var(--surface2); color: var(--text); margin-bottom: 10px; }
    .modal-input:focus { outline: none; border-color: var(--blue); }
    .modal-btns { display: flex; gap: 8px; }
    .modal-btn { flex: 1; padding: 9px; border-radius: 8px; font-size: 13px; cursor: pointer; font-weight: 500; border: 0.5px solid var(--border2); }
    .modal-btn.primary { background: var(--text); color: var(--bg); border-color: var(--text); }
    .modal-btn.secondary { background: var(--surface2); color: var(--text2); }

    /* 로딩 */
    .loading { text-align: center; padding: 40px; color: var(--text2); font-size: 14px; }
    .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); display: inline-block; margin-right: 5px; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  </style>
</head>
<body>
<div class="app">
  <div id="main-content">
    <div class="loading">불러오는 중...</div>
  </div>
</div>

<!-- 공유 모달 -->
<div class="modal-overlay" id="share-modal">
  <div class="modal">
    <h3>공유 설정</h3>
    <p>공유 코드를 입력하면 같은 가계부를 함께 사용할 수 있어요. 새로 만들거나 기존 코드를 입력하세요.</p>
    <input class="modal-input" id="share-input" placeholder="공유 코드 입력 (예: family-budget)" />
    <div style="font-size:11px;color:var(--text3);margin-bottom:12px">현재 코드: <strong id="current-code-display" style="color:var(--text2)"></strong></div>
    <div class="modal-btns">
      <button class="modal-btn secondary" onclick="closeShareModal()">취소</button>
      <button class="modal-btn primary" onclick="applyShareCode()">적용</button>
    </div>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyACXh1ym5s10C3QrJEUJe3OYvu9S3DDxbk",
  authDomain: "my-budget-app-e220f.firebaseapp.com",
  projectId: "my-budget-app-e220f",
  storageBucket: "my-budget-app-e220f.firebasestorage.app",
  messagingSenderId: "512799255717",
  appId: "1:512799255717:web:5f39840c1d2ed8e36e314c"
};

const firebaseApp = initializeApp(firebaseConfig);
const db = getFirestore(firebaseApp);

// ── 상태 ──────────────────────────────────────────
const MONTHS = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
let curYear = new Date().getFullYear();
let curMonth = new Date().getMonth();
let shareCode = localStorage.getItem('budget-share-code') || 'default';
let unsubscribe = null;
let currentData = null;
let saving = false;

const CAT_COLORS = {
  '주거/대출':'#185FA5','교통':'#854F0B','통신':'#3B6D11',
  '구독':'#534AB7','기부':'#0F6E56',
  '식비':'#D85A30','장보기':'#BA7517','경조사':'#993556',
  '충전비':'#993C1D','여가/문화/취미':'#1D9E75','건강':'#0C447C',
  '생활용품':'#5F5E5A','기타':'#888780','급여':'#0F6E56','부수입':'#3B6D11'
};

const DEFAULT_FIXED = [
  { cat:'주거/대출', name:'보금자리론',              note:'금리 4.2% · 매월 1일 상환',           amount:null },
  { cat:'주거/대출', name:'디딤돌대출',              note:'금리 2.05% · 매월 1일 상환',           amount:null },
  { cat:'주거/대출', name:'공무원연금공단 대출',      note:'금리 4.36% · 급여일 상환',             amount:null },
  { cat:'주거/대출', name:'무궁화대출 (서울)',        note:'금리 3.21% · 이자만 · 매월 1일',       amount:null },
  { cat:'주거/대출', name:'무궁화대출 (일반)',        note:'금리 3.22% · 이자만 · 매월 1일',       amount:null },
  { cat:'주거/대출', name:'신한 마이너스통장 이자',   note:'금리 3.93% · 매월 7일',               amount:null },
  { cat:'주거/대출', name:'한국장학재단',            note:'매월 1일 · 고정',                      amount:186650, locked:true },
  { cat:'주거/대출', name:'아파트 관리비',           note:'매월',                                 amount:null },
  { cat:'교통',     name:'테슬라 모델3 할부',        note:'원리금',                               amount:null },
  { cat:'통신',     name:'통신비 합계',              note:'휴대폰 48,397원 (월정액 85,000 + 유동 9,899 - 할인 46,502) · 인터넷 22,000원 · TV 16,500원', amount:86890, locked:true },
  { cat:'구독',     name:'구글 포토',               note:'연간 월환산 · 매월',                    amount:3080 },
  { cat:'구독',     name:'가요 (효성에프엠에스)',    note:'매월 11일',                             amount:1100 },
  { cat:'구독',     name:'아이클라우드 50GB',        note:'매월 15일',                             amount:1100 },
  { cat:'구독',     name:'쿠팡 와우',               note:'매월 12일',                             amount:7890 },
  { cat:'구독',     name:'코웨이 정수기',           note:'매월 21일',                             amount:32900 },
  { cat:'구독',     name:'챗GPT (애플스토어)',      note:'매월 13일',                             amount:29000 },
  { cat:'기부',     name:'유니세프',               note:'매월',                                  amount:10000 },
];

// ── Firebase 연동 ──────────────────────────────────
function getDocId() { return `${shareCode}__${curYear}-${curMonth}`; }

function getDefaultData() {
  return { income: [], fixed: JSON.parse(JSON.stringify(DEFAULT_FIXED)), var: [] };
}

async function loadData() {
  if (unsubscribe) unsubscribe();
  const docRef = doc(db, 'budgets', getDocId());
  unsubscribe = onSnapshot(docRef, (snap) => {
    currentData = snap.exists() ? snap.data().budget : getDefaultData();
    renderAll();
  });
}

async function saveData() {
  if (!currentData || saving) return;
  saving = true;
  try {
    await setDoc(doc(db, 'budgets', getDocId()), { budget: currentData });
  } catch(e) { console.error(e); }
  saving = false;
}

// ── 유틸 ──────────────────────────────────────────
function fmt(n) {
  if (n === null || n === undefined || n === '') return '';
  if (n === 0) return '0원';
  return Math.abs(n).toLocaleString('ko-KR') + '원';
}
function sumArr(arr) { return arr.reduce((a,b) => a + (Number(b.amount)||0), 0); }
function groupBy(arr, k) {
  const g = {};
  arr.forEach(i => { const v = i[k]||'기타'; if(!g[v]) g[v]=[]; g[v].push(i); });
  return g;
}
async function getPrevData() {
  let pm = curMonth-1, py = curYear;
  if (pm < 0) { pm = 11; py--; }
  const id = `${shareCode}__${py}-${pm}`;
  const snap = await getDoc(doc(db, 'budgets', id));
  return snap.exists() ? snap.data().budget : getDefaultData();
}

// ── 렌더 ──────────────────────────────────────────
function renderAll() {
  document.getElementById('main-content').innerHTML = buildHTML();
  attachEvents();
  updateSummary();
  renderTrend();
  checkUnfilled();
}

function buildHTML() {
  return `
    <div class="header">
      <div class="month-nav">
        <button class="nav-btn" id="btn-prev">←</button>
        <span class="month-title">${curYear}년 ${MONTHS[curMonth]}</span>
        <button class="nav-btn" id="btn-next">→</button>
      </div>
      <button class="share-btn" id="btn-share">🔗 공유</button>
    </div>
    <div style="font-size:11px;color:var(--text3);margin-bottom:12px">
      <span class="sync-dot"></span>실시간 동기화 중 · 공유코드: <strong style="color:var(--text2)">${shareCode}</strong>
    </div>
    <div class="tab-row">
      <button class="tab active" id="tab-month-btn">이번 달</button>
      <button class="tab" id="tab-trend-btn">월별 추이</button>
    </div>

    <div id="tab-month">
      <div id="unfilled-notice" class="notice"></div>
      <div class="summary-grid">
        <div class="metric"><div class="metric-label">총 수입</div><div class="metric-value green" id="s-income">-</div><div class="metric-diff" id="d-income"></div></div>
        <div class="metric"><div class="metric-label">총 지출</div><div class="metric-value red" id="s-expense">-</div><div class="metric-diff" id="d-expense"></div></div>
        <div class="metric"><div class="metric-label">순 잔액</div><div class="metric-value" id="s-balance">-</div><div class="metric-diff" id="d-balance"></div></div>
      </div>
      <div class="summary-grid two">
        <div class="metric"><div class="metric-label">고정지출</div><div class="metric-value" id="s-fixed" style="font-size:15px">-</div><div class="metric-diff" id="d-fixed"></div></div>
        <div class="metric"><div class="metric-label">변동지출</div><div class="metric-value" id="s-var" style="font-size:15px">-</div><div class="metric-diff" id="d-var"></div></div>
      </div>

      ${buildSection('income', '💰 수입', buildIncomeList(), buildIncomeAddRow())}
      ${buildSection('fixed', '📌 고정지출', buildFixedList(), buildFixedAddRow(), true)}
      ${buildSection('var', '📊 변동지출', buildVarList(), buildVarAddRow())}

      <div class="section">
        <div class="sec-head"><span class="sec-title">📋 지출 카테고리 구성</span></div>
        <div class="sec-body">
          <div class="bar-stack" id="cat-bar"></div>
          <div class="legend-row" id="cat-legend"></div>
        </div>
      </div>
    </div>

    <div id="tab-trend" style="display:none">
      <div class="section">
        <div class="sec-head"><span class="sec-title">📈 월별 수입 / 지출 (최근 6개월)</span></div>
        <div class="sec-body" id="trend-chart" style="padding-top:12px"></div>
        <div style="display:flex;gap:14px;padding:0 14px 12px;font-size:11px;color:var(--text2)">
          <span style="display:flex;align-items:center;gap:4px"><span style="width:8px;height:8px;background:#1d9e75;border-radius:2px;display:inline-block"></span>수입</span>
          <span style="display:flex;align-items:center;gap:4px"><span style="width:8px;height:8px;background:#d85a30;border-radius:2px;display:inline-block"></span>지출</span>
        </div>
      </div>
      <div class="section">
        <div class="sec-head"><span class="sec-title">↕ 전월 대비 증감</span></div>
        <div class="sec-body" id="diff-table"></div>
      </div>
      <div class="section">
        <div class="sec-head"><span class="sec-title">📊 카테고리별 지출 추이</span></div>
        <div class="sec-body" id="cat-trend"></div>
      </div>
    </div>
  `;
}

function buildSection(id, title, list, addRow, hasWarnBadge=false) {
  const badge = hasWarnBadge ? `<span id="fixed-warn-badge" class="badge-warn">미입력</span>` : '';
  return `
    <div class="section" id="sec-${id}">
      <div class="sec-head" onclick="toggleSec('sec-${id}')">
        <span class="sec-title">${title} ${badge}</span>
        <span style="display:flex;align-items:center;gap:8px">
          <span style="font-size:13px;font-weight:600;color:${id==='income'?'var(--green)':'var(--red)'}" id="t-${id}"></span>
          <span class="chevron">▼</span>
        </span>
      </div>
      <div class="sec-body">
        <div id="list-${id}">${list}</div>
        ${addRow}
      </div>
    </div>`;
}

function buildCatGroup(cat, items, type) {
  const color = CAT_COLORS[cat]||'#888';
  const catSum = sumArr(items);
  let rows = items.map(item => {
    const idx = currentData[type].indexOf(item);
    if (type === 'fixed') {
      const isEmpty = item.amount === null || item.amount === undefined;
      const amtCell = item.locked
        ? `<span class="amt-fixed">${fmt(item.amount)}</span>`
        : `<div style="display:flex;align-items:center;gap:4px">
            <input class="amt-input${isEmpty?' empty':''}" type="text" inputmode="numeric"
              value="${isEmpty?'':item.amount.toLocaleString('ko-KR')}"
              placeholder="금액 입력"
              data-type="fixed" data-idx="${idx}"
            /><span class="amt-unit">원</span>
           </div>`;
      return `<div class="entry-row">
        <div class="entry-info">
          <div class="entry-name">${item.name}</div>
          ${item.note?`<div class="entry-note">${item.note}</div>`:''}
        </div>
        <div class="entry-right">
          ${amtCell}
          <button class="entry-del" data-type="fixed" data-idx="${idx}">×</button>
        </div>
      </div>`;
    } else {
      return `<div class="entry-row">
        <div class="entry-info"><div class="entry-name">${item.name}</div></div>
        <div class="entry-right">
          <span class="amt-fixed">${fmt(item.amount)}</span>
          <button class="entry-del" data-type="${type}" data-idx="${idx}">×</button>
        </div>
      </div>`;
    }
  }).join('');
  return `<div class="cat-block">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
      <span class="cat-label" style="background:${color}22;color:${color}">${cat}</span>
      <span class="cat-sum">${catSum?fmt(catSum):''}</span>
    </div>${rows}</div>`;
}

function buildIncomeList() {
  if (!currentData?.income?.length) return '<div class="empty">항목이 없습니다</div>';
  return Object.entries(groupBy(currentData.income,'cat')).map(([c,items])=>buildCatGroup(c,items,'income')).join('');
}
function buildFixedList() {
  if (!currentData?.fixed?.length) return '<div class="empty">항목이 없습니다</div>';
  return Object.entries(groupBy(currentData.fixed,'cat')).map(([c,items])=>buildCatGroup(c,items,'fixed')).join('');
}
function buildVarList() {
  if (!currentData?.var?.length) return '<div class="empty">항목이 없습니다</div>';
  return Object.entries(groupBy(currentData.var,'cat')).map(([c,items])=>buildCatGroup(c,items,'var')).join('');
}

function buildIncomeAddRow() {
  return `<div class="add-row">
    <select class="sel-cat" id="add-income-cat"><option value="급여">급여</option><option value="부수입">부수입</option><option value="기타">기타</option></select>
    <input class="inp-name" id="add-income-name" placeholder="항목명" />
    <input class="inp-amt" id="add-income-amt" placeholder="금액" type="number" />
    <button class="add-btn" data-add="income">+ 추가</button>
  </div>`;
}
function buildFixedAddRow() {
  return `<div class="add-row">
    <select class="sel-cat" id="add-fixed-cat">
      <option value="주거/대출">주거/대출</option><option value="교통">교통</option>
      <option value="통신">통신</option><option value="구독">구독</option>
      <option value="기부">기부</option><option value="기타">기타</option>
    </select>
    <input class="inp-name" id="add-fixed-name" placeholder="항목명" />
    <button class="add-btn" data-add="fixed">+ 추가</button>
  </div>`;
}
function buildVarAddRow() {
  return `<div class="add-row">
    <select class="sel-cat" id="add-var-cat">
      <option value="식비">식비</option><option value="장보기">장보기/기타</option>
      <option value="경조사">경조사</option><option value="교통">교통 (하이패스)</option>
      <option value="충전비">충전비</option><option value="여가/문화/취미">여가/문화/취미</option>
      <option value="건강">건강</option><option value="생활용품">생활용품</option>
      <option value="기타">기타</option>
    </select>
    <input class="inp-name" id="add-var-name" placeholder="항목명" />
    <input class="inp-amt" id="add-var-amt" placeholder="금액" type="number" />
    <button class="add-btn" data-add="var">+ 추가</button>
  </div>`;
}

// ── 이벤트 ──────────────────────────────────────────
function attachEvents() {
  document.getElementById('btn-prev')?.addEventListener('click', () => changeMonth(-1));
  document.getElementById('btn-next')?.addEventListener('click', () => changeMonth(1));
  document.getElementById('btn-share')?.addEventListener('click', openShareModal);
  document.getElementById('tab-month-btn')?.addEventListener('click', (e) => showTab('month', e.target));
  document.getElementById('tab-trend-btn')?.addEventListener('click', (e) => showTab('trend', e.target));

  // 금액 입력 (고정지출 인라인)
  document.querySelectorAll('.amt-input').forEach(input => {
    input.addEventListener('change', (e) => {
      const idx = parseInt(e.target.dataset.idx);
      const parsed = parseInt(e.target.value.replace(/,/g,''));
      currentData.fixed[idx].amount = isNaN(parsed)||parsed<=0 ? null : parsed;
      e.target.classList.toggle('empty', !e.target.value);
      saveData();
      updateSummary();
      checkUnfilled();
    });
  });

  // 삭제 버튼
  document.querySelectorAll('.entry-del').forEach(btn => {
    btn.addEventListener('click', (e) => {
      const type = e.target.dataset.type;
      const idx = parseInt(e.target.dataset.idx);
      currentData[type].splice(idx, 1);
      saveData();
      renderAll();
    });
  });

  // 추가 버튼
  document.querySelectorAll('[data-add]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      const type = e.target.dataset.add;
      const catEl = document.getElementById(`add-${type}-cat`);
      const nameEl = document.getElementById(`add-${type}-name`);
      const amtEl = document.getElementById(`add-${type}-amt`);
      const name = nameEl?.value.trim();
      if (!name) { nameEl?.focus(); return; }
      if (type === 'fixed') {
        currentData.fixed.push({ cat: catEl?.value||'기타', name, note:'', amount: null });
      } else {
        const amount = parseInt(amtEl?.value||'');
        if (!amount || amount <= 0) { amtEl?.focus(); return; }
        currentData[type].push({ cat: catEl?.value||'기타', name, amount });
      }
      saveData();
      renderAll();
    });
  });

  // 섹션 토글
  window.toggleSec = (id) => {
    const sec = document.getElementById(id);
    if (!sec) return;
    sec.classList.toggle('collapsed');
    const body = sec.querySelector('.sec-body');
    if (body) body.style.display = sec.classList.contains('collapsed') ? 'none' : '';
  };
}

// ── 요약 업데이트 ──────────────────────────────────
async function updateSummary() {
  if (!currentData) return;
  const totalInc = sumArr(currentData.income);
  const totalFixed = sumArr(currentData.fixed);
  const totalVar = sumArr(currentData.var);
  const totalExp = totalFixed + totalVar;
  const bal = totalInc - totalExp;

  const set = (id, val) => { const el=document.getElementById(id); if(el) el.textContent=val; };
  set('t-income', fmt(totalInc));
  set('t-fixed', fmt(totalFixed));
  set('t-var', fmt(totalVar));
  set('s-income', totalInc ? fmt(totalInc) : '-');
  set('s-expense', totalExp ? fmt(totalExp) : '-');
  set('s-fixed', totalFixed ? fmt(totalFixed) : '-');
  set('s-var', totalVar ? fmt(totalVar) : '-');

  const balEl = document.getElementById('s-balance');
  if (balEl) {
    balEl.textContent = (!totalInc && !totalExp) ? '-' : (bal<0?'-':'') + fmt(Math.abs(bal));
    balEl.style.color = bal >= 0 ? 'var(--green)' : 'var(--red)';
  }

  // 전월 비교
  const pd = await getPrevData();
  const pInc = sumArr(pd.income), pFixed = sumArr(pd.fixed), pVar = sumArr(pd.var);
  const pExp = pFixed + pVar, pBal = pInc - pExp;

  function setDiff(elId, cur, prev) {
    const el = document.getElementById(elId); if (!el) return;
    if (!cur && !prev) { el.textContent = ''; return; }
    const d = cur - prev;
    if (d === 0) { el.textContent = '전월 동일'; el.className = 'metric-diff diff-same'; return; }
    el.textContent = `전월 대비 ${d>0?'+':''}${fmt(d)} ${d>0?'▲':'▼'}`;
    el.className = 'metric-diff ' + (d>0?'diff-up':'diff-down');
  }
  setDiff('d-income', totalInc, pInc);
  setDiff('d-expense', totalExp, pExp);
  setDiff('d-fixed', totalFixed, pFixed);
  setDiff('d-var', totalVar, pVar);
  const bD = bal - pBal;
  const bEl = document.getElementById('d-balance');
  if (bEl) {
    if (!bal && !pBal) { bEl.textContent = ''; }
    else { bEl.textContent = `전월 대비 ${bD>0?'+':''}${fmt(bD)} ${bD>0?'▲':'▼'}`; bEl.className = 'metric-diff ' + (bD>0?'diff-up':'diff-down'); }
  }

  // 카테고리 바
  const allExp = [...currentData.fixed, ...currentData.var];
  const catT = {};
  allExp.forEach(i => { const c=i.cat||'기타'; catT[c]=(catT[c]||0)+Number(i.amount||0); });
  const total = Object.values(catT).reduce((a,b)=>a+b,0);
  const barEl = document.getElementById('cat-bar');
  const legEl = document.getElementById('cat-legend');
  if (barEl) barEl.innerHTML = total
    ? Object.entries(catT).map(([c,v])=>`<div class="bar-seg" style="width:${Math.round(v/total*100)}%;background:${CAT_COLORS[c]||'#888'}" title="${c}: ${fmt(v)}"></div>`).join('')
    : '<div style="flex:1;background:var(--surface2);height:100%;border-radius:4px"></div>';
  if (legEl) legEl.innerHTML = total
    ? Object.entries(catT).map(([c,v])=>`<span class="legend-item"><span class="legend-dot" style="background:${CAT_COLORS[c]||'#888'}"></span>${c} ${Math.round(v/total*100)}%</span>`).join('')
    : '';
}

function checkUnfilled() {
  if (!currentData) return;
  const unfilled = currentData.fixed.filter(i => !i.locked && (i.amount===null||i.amount===undefined));
  const notice = document.getElementById('unfilled-notice');
  const badge = document.getElementById('fixed-warn-badge');
  if (notice) { notice.style.display = unfilled.length ? 'block' : 'none'; if(unfilled.length) notice.textContent = `고정지출 미입력 ${unfilled.length}개: ${unfilled.map(i=>i.name).join(', ')}`; }
  if (badge) badge.style.display = unfilled.length ? 'inline' : 'none';
}

// ── 추이 ──────────────────────────────────────────
async function renderTrend() {
  const months = [];
  for (let i = 5; i >= 0; i--) {
    let m = curMonth-i, y = curYear;
    if (m < 0) { m += 12; y--; }
    const id = `${shareCode}__${y}-${m}`;
    const snap = await getDoc(doc(db, 'budgets', id));
    const d = snap.exists() ? snap.data().budget : getDefaultData();
    const inc = sumArr(d.income), exp = sumArr(d.fixed)+sumArr(d.var);
    const cats = {};
    [...d.fixed,...d.var].forEach(item=>{ const c=item.cat||'기타'; cats[c]=(cats[c]||0)+Number(item.amount||0); });
    months.push({ label: MONTHS[m], inc, exp, cats });
  }
  const maxVal = Math.max(...months.map(m=>Math.max(m.inc,m.exp)), 1);

  const chartEl = document.getElementById('trend-chart');
  if (chartEl) chartEl.innerHTML = months.map(m=>`
    <div class="trend-row">
      <span class="trend-label">${m.label}</span>
      <div class="trend-bars">
        <div class="trend-bw"><div class="trend-bi" style="width:${Math.round(m.inc/maxVal*100)}%"></div></div>
        <div class="trend-bw"><div class="trend-be" style="width:${Math.round(m.exp/maxVal*100)}%"></div></div>
      </div>
      <div class="trend-vals">
        <span style="color:#1d9e75">${m.inc?fmt(m.inc):'-'}</span>
        <span style="color:#d85a30">${m.exp?fmt(m.exp):'-'}</span>
      </div>
    </div>`).join('');

  const diffEl = document.getElementById('diff-table');
  if (diffEl) diffEl.innerHTML = months.slice(1).map((m,i)=>{
    const prev = months[i];
    const iD = m.inc-prev.inc, eD = m.exp-prev.exp;
    const d = (v) => !v ? `<span style="color:var(--text3)">동일</span>` : `<span style="color:${v>0?'var(--green)':'var(--red)'}">${v>0?'+':''}${fmt(v)} ${v>0?'▲':'▼'}</span>`;
    return `<div class="diff-row">
      <span style="color:var(--text2);width:60px;flex-shrink:0;font-size:11px">${prev.label}→${m.label}</span>
      <span style="flex:1">수입 ${d(iD)}</span><span style="flex:1">지출 ${d(eD)}</span>
    </div>`;
  }).join('') || '<div class="empty">데이터 없음</div>';

  const allCats = [...new Set(months.flatMap(m=>Object.keys(m.cats)))];
  const catEl = document.getElementById('cat-trend');
  if (catEl) catEl.innerHTML = allCats.map(cat => {
    const max = Math.max(...months.map(m=>m.cats[cat]||0), 1);
    return `<div style="margin-bottom:12px">
      <span style="font-size:12px;font-weight:600;color:${CAT_COLORS[cat]||'#888'}">${cat}</span>
      ${months.map(m=>`
        <div style="display:flex;align-items:center;gap:8px;margin-top:3px;font-size:11px">
          <span style="width:30px;text-align:right;color:var(--text3)">${m.label}</span>
          <div style="flex:1;background:var(--surface2);border-radius:3px;height:12px;overflow:hidden">
            <div style="width:${Math.round((m.cats[cat]||0)/max*100)}%;height:100%;background:${CAT_COLORS[cat]||'#888'};border-radius:3px;opacity:0.75"></div>
          </div>
          <span style="width:72px;text-align:right;color:var(--text2)">${m.cats[cat]?fmt(m.cats[cat]):'-'}</span>
        </div>`).join('')}
    </div>`;
  }).join('') || '<div class="empty">데이터 없음</div>';
}

// ── 공유 모달 ──────────────────────────────────────
window.openShareModal = () => {
  document.getElementById('current-code-display').textContent = shareCode;
  document.getElementById('share-input').value = shareCode;
  document.getElementById('share-modal').style.display = 'flex';
};
window.closeShareModal = () => {
  document.getElementById('share-modal').style.display = 'none';
};
window.applyShareCode = () => {
  const val = document.getElementById('share-input').value.trim().replace(/\s/g,'-');
  if (!val) return;
  shareCode = val;
  localStorage.setItem('budget-share-code', shareCode);
  closeShareModal();
  loadData();
};

// ── 탭 / 월 ──────────────────────────────────────
window.showTab = (tab, btn) => {
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const monthEl = document.getElementById('tab-month');
  const trendEl = document.getElementById('tab-trend');
  if (monthEl) monthEl.style.display = tab==='month' ? '' : 'none';
  if (trendEl) trendEl.style.display = tab==='trend' ? '' : 'none';
};

function changeMonth(dir) {
  curMonth += dir;
  if (curMonth > 11) { curMonth = 0; curYear++; }
  if (curMonth < 0) { curMonth = 11; curYear--; }
  loadData();
}

// ── 시작 ──────────────────────────────────────────
loadData();
</script>
